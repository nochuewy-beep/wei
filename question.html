<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>wei</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<script>
if (localStorage.getItem("verifiedJunwei") !== "true") {
    window.location.href = "index.html";
}
</script>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: 'Quicksand', sans-serif;
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px;
  background: linear-gradient(135deg, #ffe6f0, #ffeef7, #fff7fb);
}

/* CARD */
.card {
  width: 100%;
  max-width: 460px;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(18px);
  border-radius: 28px;
  padding: 28px 22px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.12);
  text-align: center;
  animation: popIn 0.5s ease;
}

@keyframes popIn {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* TITLE */
h1 {
  font-size: 22px;
  margin-bottom: 18px;
  color: #ff4d6d;
  font-weight: 700;
  line-height: 1.3;
}

/* BUTTONS */
.buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 18px;
}

button {
  border: none;
  padding: 12px 20px;
  border-radius: 999px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s ease;
  box-shadow: 0 8px 18px rgba(0,0,0,0.1);
}

button:active {
  transform: scale(0.96);
}

#yesBtn {
  background: linear-gradient(135deg, #7cf7b1, #4ad991);
  color: white;
}

#noBtn {
  background: linear-gradient(135deg, #ff7b9c, #ff4d6d);
  color: white;
}

/* IMAGE */
img {
  width: 100%;
  max-width: 220px;
  margin-top: 10px;
  border-radius: 18px;
  box-shadow: 0 12px 25px rgba(0,0,0,0.15);
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* MESSAGE */
#noMsg {
  margin-top: 14px;
  font-size: 15px;
  color: #ff4d6d;
  font-weight: 600;
  min-height: 20px;
  transition: 0.25s ease;
}

/* BACK BUTTON */
.iosBack {
  position: fixed;
  top: 18px;
  left: 18px;
  width: 44px;
  height: 44px;
  border-radius: 999px;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: #ff4d6d;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: 0.2s ease;
}

.iosBack:hover {
  transform: scale(1.08);
}

/* MOBILE */
@media (max-width: 480px) {
  h1 {
    font-size: 18px;
  }

  .card {
    padding: 22px 18px;
  }

  button {
    width: 100%;
    max-width: 180px;
  }
}
</style>
</head>

<body>

<div class="iosBack" onclick="goBack()">←</div>

<div class="card">
  <h1>wei, do you love me? >_<</h1>

  <div class="buttons">
    <button id="yesBtn">yes</button>
    <button id="noBtn">no </button>
  </div>

  <img id="catGif"
    src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExcmJzem1wYmwzeXZpcXBqdDkzMzl6eTZ1Y2FwMmk5b3Yxb2ZsaHlweSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/oBzNtBLa8R38UF9jFp/giphy.gif"
  />

  <div id="noMsg"></div>
</div>

<script>
function goBack() {
  document.body.style.opacity = "0";
  setTimeout(() => {
    window.location.href = "index.html";
  }, 300);
}

/* NO BUTTON LOGIC */
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const noMsg = document.getElementById("noMsg");

let yesSize = 16;
let clicks = 0;
let i = 0;

const msgs = [
  "are you sure? ",
  "no changing of minds? ",
  "really sure? ",
  "think again ",
  "last chance... "
];

noBtn.addEventListener("click", () => {
  clicks++;

  noMsg.textContent = msgs[i];
  i = Math.min(i + 1, msgs.length - 1);

  yesSize += 10;
  yesBtn.style.fontSize = yesSize + "px";
  yesBtn.style.transform = `scale(${1 + yesSize / 140})`;

  if (clicks > 5) {
    noBtn.style.position = "fixed";
    noBtn.style.bottom = "20px";
    noBtn.style.right = "20px";
  }
});

yesBtn.addEventListener("click", () => {
  document.querySelector(".card").innerHTML = `
    <h2 style="color:#ff4d6d;">💖 i knew it! 💖</h2>
    <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" />
  `;
});
</script>

</body>
</html>
